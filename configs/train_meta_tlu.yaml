accumulation_steps: 2
ep_per_batch: 2
max_epoch: 40
model: gnn
model_args:
  encoder: resnet50
  encoder_args:
    image_size: 224
    pretrained: true
n_query: 15
n_shot: 5
n_way: 5
optimizer: adam
optimizer_args:
  lr: 0.0001
  milestones:
  - 10       
  - 20
  - 30
  weight_decay: 1.e-3   
test_batches: 200        
train_batches: 200
train_dataset: image-folder-custom
train_dataset_args:
  augment: true
  image_size: 224
  max_samples_per_class: 600
  root_path: /kaggle/input/datasets/nta212/tlu-fake-fruit/data_cropped_224_da_clean/data_cropped_224_da_clean
  split: train
  split_file: /kaggle/input/datasets/nta212/split-for-tlu-fake-fruit/slpit_thuNghiem.json
val_dataset: image-folder-custom
val_dataset_args:
  augment: false
  image_size: 224
  root_path: /kaggle/input/datasets/nta212/tlu-fake-fruit/data_cropped_224_da_clean/data_cropped_224_da_clean
  split: val
  split_file: /kaggle/input/datasets/nta212/split-for-tlu-fake-fruit/slpit_thuNghiem.json
visualize_datasets: false
