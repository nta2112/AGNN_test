train_dataset: image-folder-custom
train_dataset_args:
    root_path: /kaggle/input/tlu-fake-fruit
    split_file: /kaggle/input/datasets/nta212/split-for-tlu-fake-fruit/split.json
    split: train
    augment: True
    image_size: 224
    max_samples_per_class: 200

tval_dataset: image-folder-custom
tval_dataset_args:
    root_path: /kaggle/input/tlu-fake-fruit
    split_file: /kaggle/input/datasets/nta212/split-for-tlu-fake-fruit/split.json
    split: test
    augment: False
    image_size: 224

val_dataset: image-folder-custom
val_dataset_args:
    root_path: /kaggle/input/tlu-fake-fruit
    split_file: /kaggle/input/datasets/nta212/split-for-tlu-fake-fruit/split.json
    split: val
    augment: False
    image_size: 224

model: gnn
model_args: 
    encoder: resnet50
    encoder_args: 
        pretrained: True
        image_size: 224
# scan checkpoint if needed, otherwise rely on torchvision pre-trained
load_encoder: /kaggle/input/models/nta212/restnet50/pytorch/default/1/max-va.pth
n_way: 5
n_shot: 5
n_query: 15
train_batches: 200
test_batches: 100
ep_per_batch: 2

max_epoch: 20 
optimizer: adam
optimizer_args: {lr: 0.0001, weight_decay: 1.e-5}

visualize_datasets: False
